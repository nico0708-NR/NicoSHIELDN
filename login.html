<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NicoShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-glow g1"></div>
    <div class="auth-glow g2"></div>
    <div class="auth-grid"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-shield">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
      </div>
      <h1 class="auth-brand">Nico<strong>Shield</strong></h1>
    </div>
    <p class="auth-tagline">Plataforma de Ciberseguridad Defensiva</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="toggle-pw" onclick="togglePassword('password')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <label class="check-label">
        <input type="checkbox" name="remember" />
        <span>Mantener sesión iniciada</span>
      </label>
      <button type="submit" class="btn-primary btn-block">Iniciar sesión</button>
    </form>

    <p class="auth-switch">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate aquí</a></p>

    <div class="auth-creds">
      <span class="creds-label">Demo:</span>
      <code>admin</code> / <code>NicoShield2024!</code>
    </div>
  </div>

  <script>
    function togglePassword(id) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
